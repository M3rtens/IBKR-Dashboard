name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        # The full app needs ib_insync/Dash, but the tested modules only
        # need the scientific stack — keep CI fast and network-light.
        run: pip install pandas numpy scipy pytest

      - name: Run tests
        run: pytest -q
